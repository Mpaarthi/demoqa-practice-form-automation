apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup-task
spec:
  steps:
    - name: cleanup
      image: alpine:latest
      script: |
        #!/bin/sh
        echo "Cleaning up workspace..."
        rm -rf node_modules
        rm -rf coverage

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: test-task
spec:
  steps:
    - name: install-dependencies
      image: node:18
      script: |
        #!/bin/sh
        npm install
        npm install jest --save-dev

    - name: run-jest-test
      image: node:18
      script: |
        #!/bin/sh
        echo "Running Jest tests..."
        npx jest
